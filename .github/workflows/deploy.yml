name: Deploy Evolution API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS via Docker Swarm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            mkdir -p /root/evolution
            cat > /root/evolution/.env << 'ENVEOF'
          SERVER_URL=${{ secrets.SERVER_URL }}
          AUTHENTICATION_API_KEY=${{ secrets.AUTHENTICATION_API_KEY }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          LOG_LEVEL=INFO
          ENVEOF
          "

      - name: Copy stack file to VPS
        run: |
          scp evolution-stack.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/evolution/evolution-stack.yml

      - name: Create overlay network if not exists
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            docker network inspect evolution_network >/dev/null 2>&1 || \
            docker network create --driver overlay --attachable evolution_network
            echo 'Network evolution_network OK'
          "

      - name: Deploy stack to Docker Swarm
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /root/evolution
            set -a && source .env && set +a
            docker stack deploy \
              --compose-file evolution-stack.yml \
              --with-registry-auth \
              --prune \
              evolution
            echo 'Stack deployed!'
          "

      - name: Wait for services to stabilize
        run: sleep 30

      - name: Check deployment status
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '=== Stack Services ==='
            docker stack services evolution
            echo ''
            echo '=== Tasks Status ==='
            docker stack ps evolution --no-trunc
          "
